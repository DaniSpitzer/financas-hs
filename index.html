<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças da Avó</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .total { font-size: 1.5em; font-weight: bold; text-align: center; margin: 20px 0; color: #d9534f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gastos da Avó</h2>
    
    <label>Data</label>
    <input type="date" id="data">
    
    <label>Valor (€)</label>
    <input type="number" id="valor" step="0.01" placeholder="0.00">
    
    <label>Categoria</label>
    <select id="categoria">
        <option value="Alimentação">Alimentação</option>
        <option value="Saúde/Farmácia">Saúde/Farmácia</option>
        <option value="Casa/Contas">Casa/Contas</option>
        <option value="Outros">Outros</option>
    </select>
    
    <label>Descrição</label>
    <input type="text" id="descricao" placeholder="O que comprou?">
    
    <button id="btnAdicionar" onclick="adicionarDespesa()">Adicionar Despesa</button>

    <div class="total" id="valorTotal">Total: 0.00€</div>
    
    <canvas id="meuGrafico"></canvas>

    <table id="tabelaDespesas">
        <thead>
            <tr>
                <th>Data</th>
                <th>Cat.</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwu8BrZb72UVrCnBSARtPze90salLnEy7opND4SUWHiDxj75-XItcZEsD6SmQp8T-olHw/exec";
    let despesas = [];
    let meuGrafico;

    async function carregarDados() {
        try {
            const response = await fetch(APP_URL);
            despesas = await response.json();
            atualizarInterface();
        } catch (e) { console.log("Erro ao carregar:", e); }
    }

    async function adicionarDespesa() {
        const btn = document.getElementById('btnAdicionar');
        const data = document.getElementById('data').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const categoria = document.getElementById('categoria').value;
        const descricao = document.getElementById('descricao').value;

        if (!data || isNaN(valor)) return alert("Preencha os campos!");

        btn.innerText = "A guardar...";
        btn.disabled = true;

        const novaDespesa = { data, valor, categoria, descricao };

        try {
            // Usamos 'no-cors' para evitar bloqueios do Google, mas ele guarda os dados!
            await fetch(APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(novaDespesa)
            });

            // Esperar um pouco para o Google processar e recarregar
            setTimeout(() => {
                btn.innerText = "Adicionar Despesa";
                btn.disabled = false;
                document.getElementById('valor').value = '';
                document.getElementById('descricao').value = '';
                carregarDados();
            }, 1500);
        } catch (e) { alert("Erro ao guardar!"); btn.disabled = false; }
    }

    function atualizarInterface() {
        const corpoTabela = document.querySelector('#tabelaDespesas tbody');
        corpoTabela.innerHTML = '';
        let total = 0;
        let resumoCategorias = {};

        despesas.forEach(d => {
            let v = parseFloat(d.valor);
            total += v;
            resumoCategorias[d.categoria] = (resumoCategorias[d.categoria] || 0) + v;

            let row = `<tr>
                <td>${new Date(d.data).toLocaleDateString('pt-PT')}</td>
                <td>${d.categoria}</td>
                <td>${v.toFixed(2)}€</td>
            </tr>`;
            corpoTabela.innerHTML += row;
        });

        document.getElementById('valorTotal').innerText = `Total: ${total.toFixed(2)}€`;
        atualizarGrafico(resumoCategorias);
    }

    function atualizarGrafico(dados) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(dados),
                datasets: [{
                    data: Object.values(dados),
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0']
                }]
            }
        });
    }

    window.onload = carregarDados;
</script>

</body>
</html>
