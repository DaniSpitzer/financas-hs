<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Hedy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        button { background-color: #1a73e8; color: white; border: none; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-pdf { background-color: #555; margin-top: 10px; }
        
        .total { font-size: 1.5em; font-weight: bold; text-align: center; margin: 20px 0; color: #d93025; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        
        /* Área que será capturada para o PDF */
        #area-report { 
        background-color: white !important; 
        color: black !important;
        padding: 20px !important;
        }
        #area-report table {
        display: table !important; 
        width: 100% !important;
        border-collapse: collapse !important;
        color: #000 !important; 
        }
    </style>
</head>
<body>

<div class="container">
    <div id="area-registo">
        <h2>Despesas da Hedy</h2>
        
        <label>Data</label>
        <input type="date" id="data">
        
        <label>Valor (R$)</label>
        <input type="number" id="valor" step="0.01" placeholder="0.00">
        
        <label>Categoria</label>
        <select id="categoria">
            <option value="Alimentação">Alimentação</option>
            <option value="Saúde/Farmácia">Saúde/Farmácia</option>
            <option value="Casa/Contas">Casa/Contas</option>
            <option value="Casa/Contas">Cuidadora</option>
            <option value="Casa/Contas">Serviços da casa/Limpeza/Jardim/Manutenção</option>
            <option value="Casa/Contas">Saques</option>
            <option value="Outros">Outros</option>
        </select>
        
        <label>Descrição</label>
        <input type="text" id="descricao" placeholder="O que comprou?">
        
        <button id="btnAdicionar" onclick="adicionarDespesa()">Adicionar Despesa</button>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

  <div id="area-report" style="background: white; padding: 15px; border-radius: 10px;">
    <h3 id="titulo-report" style="text-align: center;">Relatório Mensal</h3>
    
    <div style="margin-bottom: 20px; text-align: center;">
        <label for="filtroMes">Ver outro mês:</label>
        <input type="month" id="filtroMes" onchange="carregarDadosFiltrados()">
    </div>

    <div class="total" id="valorTotal">Total: 0.00€</div>
    <canvas id="meuGrafico"></canvas>
    
    <table id="tabelaDespesas">
        <thead>
            <tr>
                <th>Data</th>
                <th>Cat.</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

    <button class="btn-pdf" onclick="gerarPDF()">📥 Baixar Relatório PDF</button>
</div>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbwu8BrZb72UVrCnBSARtPze90salLnEy7opND4SUWHiDxj75-XItcZEsD6SmQp8T-olHw/exec";
let despesas = [];
let meuGrafico;

// Função para carregar e FILTRAR os dados
async function carregarDados() {
    try {
        const response = await fetch(APP_URL);
        const todosDados = await response.json();
        
        // Guardamos todos os dados numa variável global para filtrar sem ir ao Google toda hora
        window.todasAsDespesas = todosDados; 
        
        carregarDadosFiltrados(); // Chama o filtro pela primeira vez
    } catch (e) { console.log("Erro ao carregar:", e); }
}

function carregarDadosFiltrados() {
    const selector = document.getElementById('filtroMes').value; // Formato "YYYY-MM"
    if (!selector) return;

    const [anoAlvo, mesAlvo] = selector.split("-").map(Number);
    
    // Filtrar os dados que já temos guardados
    despesas = window.todasAsDespesas.filter(d => {
        const dataD = new Date(d.data);
        return dataD.getFullYear() === anoAlvo && (dataD.getMonth() + 1) === mesAlvo;
    });

    // Atualizar o título do Relatório
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('titulo-report').innerText = "Relatório de " + meses[mesAlvo - 1];

    atualizarInterface();
}

async function adicionarDespesa() {
    const btn = document.getElementById('btnAdicionar');
    const dataInput = document.getElementById('data').value;
    const valor = parseFloat(document.getElementById('valor').value);
    const categoria = document.getElementById('categoria').value;
    const descricao = document.getElementById('descricao').value;

    if (!dataInput || isNaN(valor)) return alert("Preencha data e valor!");

    btn.innerText = "Carregando...";
    btn.disabled = true;

    try {
        await fetch(APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ data, valor, categoria, descricao })
        });

        setTimeout(() => {
            btn.innerText = "Adicionar Despesa";
            btn.disabled = false;
            document.getElementById('valor').value = '';
            document.getElementById('descricao').value = '';
            carregarDados(); // Recarrega já com o filtro aplicado
        }, 1500);
    } catch (e) { alert("Erro!"); btn.disabled = false; }
}

function atualizarInterface() {
    const corpoTabela = document.querySelector('#tabelaDespesas tbody');
    corpoTabela.innerHTML = '';
    let total = 0;
    let resumoCategorias = {};

    // Ordenar para mostrar a mais recente no topo da tabela
    const listaOrdenada = [...despesas].sort((a, b) => new Date(b.data) - new Date(a.data));

    listaOrdenada.forEach(d => {
        let v = parseFloat(d.valor);
        total += v;
        resumoCategorias[d.categoria] = (resumoCategorias[d.categoria] || 0) + v;

        let row = `<tr>
            <td>${new Date(d.data).toLocaleDateString('pt-PT')}</td>
            <td>${d.categoria}</td>
            <td>R$ ${v.toFixed(2)}</td>
        </tr>`;
        corpoTabela.innerHTML += row;
    });

    // Atualiza o título do relatório para mostrar o mês atual
    const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const mesNome = nomesMeses[new Date().getMonth()];
    document.querySelector('#area-report h3').innerText = `Relatório de ${mesNome}`;

    document.getElementById('valorTotal').innerText = `Total: R$ ${total.toFixed(2)}`;
    atualizarGrafico(resumoCategorias);
}

function atualizarGrafico(dados) {
    const ctx = document.getElementById('meuGrafico').getContext('2d');
    if (meuGrafico) meuGrafico.destroy();
    meuGrafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(dados),
            datasets: [{
                data: Object.values(dados),
                backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff']
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
}

function gerarPDF() {
    // 1. Selecionamos o elemento do relatório
    const element = document.getElementById('area-report');
    
    // 2. Opções otimizadas para garantir que o conteúdo dinâmico (tabela/gráfico) apareça
    const opt = {
        margin:       15,
        filename:     `Relatorio_Despesas_Mes_${new Date().getMonth()+1}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { 
            scale: 2, 
            useCORS: true, 
            allowTaint: true,
            letterRendering: true
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    const btn = document.querySelector('.btn-pdf');
    btn.innerText = "A processar...";

    // 3. O segredo: usamos o método .from().set().save() com uma promessa
    html2pdf().set(opt).from(element).save().then(() => {
        btn.innerText = "📥 Baixar Relatório PDF";
    }).catch(err => {
        console.error("Erro no PDF:", err);
        alert("Erro ao gerar PDF. Tente novamente.");
    });
}

window.onload = () => {
    const hoje = new Date();
    const mesFormatado = hoje.getFullYear() + "-" + String(hoje.getMonth() + 1).padStart(2, '0');
    document.getElementById('filtroMes').value = mesFormatado;
    carregarDados();
};
</script>

</body>
</html>
